# Declare env vars so Lua can read them via os.getenv()
env JWKS_URL;
env JWT_ISSUER_1;
env JWT_ISSUER_2;
env JWKS_CACHE_TTL;

events {}

http {

    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Shared dicts
    lua_shared_dict jwks_cache 1m;
    lua_shared_dict rate_limit_store 20m;

    # ==========================
    # BACKEND SERVICE
    # ==========================
    upstream backend_service {
        server backend:8000;
    }

    server {
        listen 80;

        # IMPORTANT: disable static file fallback
        root /dev/null;

        # ==========================
        # CORS CONFIGURATION
        # ==========================
        set $cors_origin "";
        set $cors_methods "GET, POST, PUT, DELETE, OPTIONS";
        set $cors_headers "Authorization, Content-Type, Accept, X-CSRF-Token";

        if ($http_origin ~* "^http://98.95.117.28:(5173|5174|3000|8080)$") {
            set $cors_origin $http_origin;
        }

        if ($http_origin = "http://98.95.117.28:3000") {
            set $cors_origin $http_origin;
        }

        # ==========================
        # AUTH ROUTES (NO JWT)
        # ==========================

        location ^~ /login {
            proxy_pass http://backend_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /logout {
            proxy_pass http://backend_service/;
            proxy_set_header Host $host;
        }

        location ^~ /callback {
            proxy_pass http://backend_service/;
            proxy_set_header Host $host;
        }

        location ^~ /refresh {
            proxy_pass http://backend_service/;
            proxy_set_header Host $host;
        }

        # ==========================
        # HEALTH CHECK
        # ==========================

        location /health {
            proxy_pass http://backend_service/health;
        }

        # ==========================
        # PROTECTED ROUTES (JWT)
        # ==========================

        location / {

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin;
                add_header 'Access-Control-Allow-Methods' $cors_methods;
                add_header 'Access-Control-Allow-Headers' $cors_headers;
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            # JWT validation
            access_by_lua_file /usr/local/openresty/nginx/lua/jwt_validator.lua;

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass http://backend_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}