services:

  postgres:
    image: postgres:15
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network


  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak

    command:
      - start-dev
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
      - --spi-theme-static-max-age=-1

    volumes:
      - ./theme:/opt/keycloak/themes

    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    networks:
      - app-network


  backend:
    build: ..
    container_name: backend
    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      ENV: ${ENV}
      KEYCLOAK_SERVER_URL: http://keycloak:8080

    depends_on:
      - keycloak

    networks:
      - app-network

  gateway:
    build: ../gateway
    container_name: api-gateway
    ports:
      - "80:80"

    volumes:
      - ../gateway/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
      - ../gateway/lua:/usr/local/openresty/nginx/lua

    env_file:
      - .env

    environment:
      JWKS_URL: ${JWKS_URL}
      JWT_ISSUER_1: ${JWT_ISSUER_1}
      JWT_ISSUER_2: ${JWT_ISSUER_2}
      JWKS_CACHE_TTL: ${JWKS_CACHE_TTL}

    depends_on:
      - backend

    networks:
      - app-network

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - app-network


  frontend:
    build:
      context: ../../AS-03-Frontend
    container_name: as03-frontend
    ports:
      - "3000:80"
    networks:
      - app-network


networks:
  app-network:
    driver: bridge


volumes:
  postgres_data: