name: AS03 Full Stack CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  BACKEND_IMAGE: hdfcas03/as03-backend-1
  FRONTEND_IMAGE: hdfcas03/as03-frontend-1
jobs:
  # ==========================================
  # BACKEND CI & SECURITY (FastAPI)
  # ==========================================
  backend:
    name: Backend Build & Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AS-03-Backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: AS-03-Backend/requirements.txt

      - name: SAST & Quality Checks
        run: |
          python -m pip install --upgrade pip pip-tools
          pip install -r requirements.txt pytest bandit pip-audit
          
          # Generate Prisma Client (if applicable)
          # prisma generate
          
          # Run Tests
          pytest --junitxml=test-results.xml || true
          
          # Security Scans
          bandit -r . -f json -o bandit-report.json || true
          pip-audit --format json --output pip-audit-report.json || true

      - name: Upload Security & Test Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-reports
          path: |
            AS-03-Backend/test-results.xml
            AS-03-Backend/bandit-report.json
            AS-03-Backend/pip-audit-report.json

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./AS-03-Backend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }},${{ env.BACKEND_IMAGE }}:latest

      - name: Container Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.BACKEND_IMAGE }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

      # ==========================================
      # DAST (OWASP ZAP) setup example
      # Disabled because the backend needs Keycloak & Postgres to boot.
      # To enable, replace `docker run` with `docker compose up -d`
      # ==========================================
      # - name: Run App for DAST
      #   if: github.ref == 'refs/heads/main'
      #   run: |
      #     docker run -d -p 8000:8000 --name target-app \
      #       -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
      #       -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
      #       ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
      #     sleep 10 # Wait for app to boot
      #
      # - name: OWASP ZAP Baseline Scan
      #   if: github.ref == 'refs/heads/main'
      #   uses: zaproxy/action-baseline@v0.12.0
      #   with:
      #     target: 'http://localhost:8000'
      #     fail_action: false

  # ==========================================
  # FRONTEND CI (React / Vite)
  # ==========================================
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AS-03-Frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: AS-03-Frontend/package-lock.json

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./AS-03-Frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }},${{ env.FRONTEND_IMAGE }}:latest

  # ==========================================
  # DEPLOY TO EC2
  # ==========================================
  deploy:
    name: Deploy to EC2
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Decode SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY_BASE64 }}" | base64 -d > key.pem
          chmod 600 key.pem

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: |
            ${{ secrets.EC2_SSH_KEY }}
          port: 22
          debug: true
          script: |
            set -e
            cd "$HOME/CI-CD-pipeline/docker-compose"
            docker compose pull
            docker compose down
            docker compose up -d
      

            echo "Healthcheck..."
            curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/v1/auth/health || true

            echo "Cleaning old images..."
            docker image prune -a -f